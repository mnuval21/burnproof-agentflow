<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>[PROJECT_NAME] — AgentFlow Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #7F00FF 0%, #3d0099 100%);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.4rem; color: #fff; font-weight: 700; }
    header h1 span { color: #F7931A; }
    .header-right { text-align: right; }
    .phase-badge {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .updated { color: rgba(255,255,255,0.45); font-size: 0.72rem; margin-top: 6px; }

    /* ── Layout ── */
    main { padding: 28px 32px; max-width: 1400px; }
    section { margin-bottom: 36px; }
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 14px;
    }

    /* ── Agent Cards ── */
    .agents { display: flex; gap: 12px; flex-wrap: wrap; }
    .agent-card {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 210px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.working { background: #7F00FF; box-shadow: 0 0 8px #7F00FF88; animation: pulse 1.8s ease-in-out infinite; }
    .dot.done    { background: #22c55e; }
    .dot.waiting { background: #333; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 0.85rem; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-task { font-size: 0.72rem; color: #555; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-status { font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .agent-status.working { color: #a78bfa; }
    .agent-status.done    { color: #4ade80; }
    .agent-status.waiting { color: #444; }

    /* ── Epic ── */
    .epic-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .epic-header h3 { font-size: 0.95rem; font-weight: 700; color: #e0e0e0; }
    .badge {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #777;
    }

    /* ── Kanban ── */
    .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
    .column { background: #111; border-radius: 10px; padding: 12px; min-height: 80px; }
    .col-header {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: inline-block;
    }
    .col-planned  .col-header { color: #666; background: #1a1a1a; }
    .col-progress .col-header { color: #a78bfa; background: rgba(127,0,255,0.12); }
    .col-review   .col-header { color: #fbbf24; background: rgba(251,191,36,0.1); }
    .col-done     .col-header { color: #4ade80; background: rgba(74,222,128,0.1); }

    .card {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 8px;
      padding: 9px 11px;
      margin-bottom: 8px;
      font-size: 0.8rem;
    }
    .card.in-progress { border-left: 3px solid #7F00FF; }
    .card.in-review   { border-left: 3px solid #fbbf24; }
    .card.done        { border-left: 3px solid #22c55e; opacity: 0.55; }
    .card-id    { color: #444; font-size: 0.67rem; font-family: monospace; margin-bottom: 3px; }
    .card-title { color: #bbb; line-height: 1.35; }
    .card-agent { color: #7F00FF; font-size: 0.68rem; margin-top: 5px; }
    .card.in-review .card-agent { color: #fbbf24; }

    .empty { color: #2a2a2a; font-size: 0.75rem; text-align: center; padding: 20px 0; }

    footer {
      text-align: center;
      padding: 28px 32px;
      color: #2a2a2a;
      font-size: 0.72rem;
    }
    footer span { color: #7F00FF; }
  </style>
</head>
<body>

<header>
  <h1>[PROJECT_NAME] <span>⚡</span></h1>
  <div class="header-right">
    <div class="phase-badge">Phase [PHASE_NUM] — [PHASE_NAME]</div>
    <div class="updated">Updated [LAST_UPDATED]</div>
  </div>
</header>

<main>

  <!-- ═══ ACTIVE AGENTS ═══════════════════════════════════════════════════════

  Working agent:

  Done agent:

  Standby agent:

    </div>
    <div class="agent-status waiting">Standby</div>
  </div>
  ══════════════════════════════════════════════════════════════════════════ -->
  <section>
    <div class="section-label">Active Agents</div>
    <div class="agents">
      [AGENT_CARDS]

  </section>


  <!-- ═══ EPICS ══════════════════════════════════════════════════════════════
  Rex: write one <section> block per Epic.

  Story card examples:

  Planned:
  <div class="card">
    <div class="card-id">STORY-1-3</div>

  </div>

  In Progress (with agent):
  <div class="card in-progress">
    <div class="card-id">STORY-1-2</div>

  </div>

  In Review:
  <div class="card in-review">

    <div class="card-title">Auth API endpoints</div>

  </div>

  Done:
  <div class="card done">
    <div class="card-id">STORY-1-0</div>
    <div class="card-title">Test framework setup</div>
  </div>

  Empty column:
  <div class="empty">—</div>
  ══════════════════════════════════════════════════════════════════════════ -->
  [EPIC_SECTIONS]

</main>

<footer>
  BurnProof-<span>AgentFlow</span> ⚡ &nbsp;·&nbsp; auto-refreshes every 30s
</footer>

</body>
</html>
